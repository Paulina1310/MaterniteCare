<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion MaterniteCare</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <section>
        <h1>Connexion</h1>
        
        <!-- Div pour les messages d'erreur/succès -->
        <div id="message" class="hidden"></div>
        
        <form id="loginForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            
            <div class="input-box">
                <input type="password" id="password" placeholder="Mot de passe" required>
            </div>
            
            <div class="remember-forgot">
                <label><input type="checkbox"> se souvenir de moi</label>
                <a href="#">Mot de passe oublié ?</a>
            </div>
            
            <button type="submit" class="login-btn">Se connecter</button>
            
            <div class="register-link">
                <p>Pas de compte ? <a href="Inscription.html">Inscription</a></p>
            </div>
        </form>
        
        <!-- Div pour afficher la réponse du serveur -->
        <div id="result" class="hidden result">
            <h3>Réponse du serveur :</h3>
            <pre id="response" class="response"></pre>
        </div>
    </section>
    
    <script src="../JS/login.js"></script>
</body>
</html>
