services:
  # Frontend - Site statique
  - type: web
    name: maternitecare-frontend
    env: static
    buildCommand: echo "Pas de build nécessaire"
    staticPublishPath: ./Frontend
    routes:
      - type: rewrite
        source: /*
        destination: /connect.html

  # Backend - Service PHP
  - type: web
    name: maternitecare-api
    env: php
    buildCommand: composer install --no-dev 2>/dev/null || echo "Pas de composer"
    startCommand: heroku-php-apache2 Backend/API/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maternitecare-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: maternitecare-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: maternitecare-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: maternitecare-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: maternitecare-db
          property: password

databases:
  - name: maternitecare-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "15"